# ──────────────────────────────────────────────────────────
# setup.cfg — tool config for multi-memory plugin
# ──────────────────────────────────────────────────────────

[tool:pytest]
testpaths = tests
addopts = -v --tb=short

[coverage:run]
source = multi_memory
branch = True

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
show_missing = True
