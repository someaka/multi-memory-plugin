# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────
# CI pipeline for multi-memory plugin
# Runs tests on push to main and on PRs against main.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # suppress Node.js 20 deprecation warning
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install hermes-agent (for bundled memory plugins)
        run: |
          git clone --depth=1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-agent
          echo "HERMES_AGENT_PATH=/tmp/hermes-agent" >> "$GITHUB_ENV"
          echo "/tmp/hermes-agent" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[all,test]"
          # Install hermes-agent deps needed by bundled memory plugins
          pip install -r /tmp/hermes-agent/requirements.txt 2>/dev/null || true

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Run tests with coverage
        env:
          PYTHONPATH: "/tmp/hermes-agent:${{ github.workspace }}/src"
        run: |
          python -m pytest tests/ -v --tb=short --cov=multi_memory --cov-report=term-missing --cov-fail-under=90
