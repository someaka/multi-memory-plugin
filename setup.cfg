# ──────────────────────────────────────────────────────────
# setup.cfg — tool config for multi-memory plugin
# ──────────────────────────────────────────────────────────

[flake8]
max-line-length = 100
exclude = .git,__pycache__,*.egg-info,.venv,venv
ignore = E203,E501,W503

[tool:pytest]
testpaths = tests
addopts = -v --tb=short
