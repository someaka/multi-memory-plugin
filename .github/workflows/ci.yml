# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────
# CI pipeline for multi-memory plugin
# Runs tests on push to main and on PRs against main.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Ruff check
        uses: astral-sh/ruff-action@v1
        with:
          args: "check src/ tests/"

      - name: Ruff format
        uses: astral-sh/ruff-action@v1
        with:
          args: "format --check src/ tests/"

  test:
    name: "Test Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install hermes-agent (pinned for MemoryProvider API stability)
        run: |
          git clone --depth=1 --branch v2026.7.7.2 \
            https://github.com/NousResearch/hermes-agent.git /tmp/hermes-agent
          echo "HERMES_AGENT_PATH=/tmp/hermes-agent" >> "$GITHUB_ENV"
          echo "/tmp/hermes-agent" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[all,test]"
          pip install -r /tmp/hermes-agent/requirements.txt

      - name: Run tests with coverage
        env:
          PYTHONPATH: "/tmp/hermes-agent:${{ github.workspace }}/src"
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=multi_memory --cov-report=term-missing --cov-fail-under=90
