# .github/workflows/ci.yml
# ──────────────────────────────────────────────────────────────
# CI pipeline for multi-memory plugin
# Runs tests on push to main and on PRs against main.
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # suppress Node.js 20 deprecation warning
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[all,test]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=multi_memory --cov-report=term-missing --cov-fail-under=90
